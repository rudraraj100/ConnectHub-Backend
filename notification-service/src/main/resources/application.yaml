server:
  port: 8086

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: rudra@root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Email (Gmail SMTP — update credentials)
  mail:
    host: smtp.gmail.com
    port: 587
    username: rudrar2002@gmail.com}
    password: oblziafnfpwrfwss
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Eureka
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# App config
app:
  notification:
    email-offline-threshold-minutes: 30
  firebase:
    enabled: false   # set true and provide service-account.json to enable FCM

logging:
  level:
    com.notification_service: DEBUG

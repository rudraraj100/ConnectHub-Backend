server:
  port: 8086

spring:
  application:
    name: notification-service

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false   # don't loop on bad messages

  datasource:
    url: jdbc:mysql://localhost:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME_LOCAL:root}
    password: ${DB_PASSWORD_LOCAL:rudra@root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Email (Gmail SMTP — update credentials)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:rudrar2002@gmail.com}
    password: ${MAIL_PASSWORD:REPLACE_WITH_GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Eureka
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false   # Gmail SMTP probe causes DOWN locally — actual sending still works

# App config
app:
  notification:
    email-offline-threshold-minutes: 30
  firebase:
    enabled: false   # set true and provide service-account.json to enable FCM

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc:
  # NOTE: Do NOT override api-docs.path.
  # The default /v3/api-docs is what the API Gateway aggregator routes expect.
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.notification_service: DEBUG

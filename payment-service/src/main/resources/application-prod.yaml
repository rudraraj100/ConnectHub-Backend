# ── Production overrides for payment-service ──

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/connecthub_payments?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: connecthub
    password: ${DB_PASSWORD}

# Razorpay — secret injected from .env
razorpay:
  key-secret: ${RAZORPAY_SECRET}

# Internal auth-service URL (co-located)
auth:
  service:
    url: http://localhost:8081

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.payment_service: INFO

# ─────────────────────────────────────────────────────────────────────────────
# SonarQube Project Properties — ConnectHub Backend
#
# These are the DEFAULT values used when no -D flags are passed on the CLI.
# The run-sonar-analysis.ps1 script OVERRIDES sonar.projectKey per service.
# ─────────────────────────────────────────────────────────────────────────────

# ── Server ────────────────────────────────────────────────────────────────────
sonar.host.url=http://localhost:9000

# !! IMPORTANT: Replace this with the token you generate in SonarQube UI.
# Go to:  http://localhost:9000 → My Account → Security → Generate Token
# Then paste it below (or pass it via -Dsonar.token=<token> on the CLI):
sonar.token=REPLACE_WITH_YOUR_SONARQUBE_TOKEN

# ── Source encoding ──────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Java version ─────────────────────────────────────────────────────────────
sonar.java.source=17

# ── Exclusions (generated / boilerplate code — not worth analyzing) ──────────
# DTOs, entities, config beans, and Application entry points are excluded
# because they contain no meaningful business logic to analyze.
sonar.exclusions=\
    **/dto/**,\
    **/entity/**,\
    **/config/**,\
    **/*Application.java,\
    **/exception/**,\
    **/constant/**

# JaCoCo XML report path (generated by mvn verify)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude the same packages from coverage metrics
sonar.coverage.exclusions=\
    **/dto/**,\
    **/entity/**,\
    **/config/**,\
    **/*Application.java,\
    **/exception/**

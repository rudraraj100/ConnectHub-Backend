# ── Production overrides for admin-server ──
# Secrets are injected via systemd EnvironmentFile=/home/connecthub/services/.env
# Spring Boot reads ${ENV_VAR} from the process environment automatically.

# Eureka — co-located on same EC2 instance
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Security — protect the dashboard in production ──
# Set ADMIN_USERNAME and ADMIN_PASSWORD in /home/connecthub/services/.env
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD}

# Tune logging for production
logging.level.de.codecentric.boot.admin=INFO
logging.level.org.springframework=WARN

spring.application.name=auth-service
server.port=8081

# ── Default profile for local development ────────────────────────────────────
# STS/IntelliJ will automatically use application-local.properties.
# In production, the systemd .env file sets SPRING_PROFILES_ACTIVE=prod
# which overrides this default — so production is NOT affected.
spring.profiles.default=local

# MYSQL DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME_LOCAL:root}
spring.datasource.password=${DB_PASSWORD_LOCAL:rudra@root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT (keep secret >= 32 chars / 256-bit in production)
app.jwt.secret=${JWT_SECRET:ConnectHub_LocalDev_Secret_256bit_NotForProduction}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.min-idle=2

# MAIL — set MAIL_PASSWORD env var or in application-local.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:rudrar2002@gmail.com}
spring.mail.password=${MAIL_PASSWORD:REPLACE_WITH_GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@connecthub.io

# FRONTEND URL (used in OAuth2 callback & password reset links)
app.frontend.url=http://localhost:4200

# OAUTH2 - GOOGLE — set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET env vars
# Create at console.cloud.google.com -> Credentials -> OAuth 2.0
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:REPLACE_WITH_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:REPLACE_WITH_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.registry-fetch-interval-seconds=5

# ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# SPRINGDOC / SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# -- RabbitMQ ----------------------------------------------------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# -- Email verification token TTL (minutes) ----------------------
app.email.verify-token-ttl-minutes=15

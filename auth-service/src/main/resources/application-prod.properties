# ── Production overrides for auth-service ──
# Secrets are injected via systemd EnvironmentFile=/home/connecthub/services/.env
# Spring Boot reads ${ENV_VAR} from the process environment automatically.

spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=connecthub
spring.datasource.password=${DB_PASSWORD}

# JWT — must match api-gateway
app.jwt.secret=${JWT_SECRET}

# Redis — same host
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mail
spring.mail.username=rudrar2002@gmail.com
spring.mail.password=${MAIL_PASSWORD}

# Frontend & OAuth2
app.frontend.url=http://connecthub.duckdns.org
spring.security.oauth2.client.registration.google.redirect-uri=http://connecthub.duckdns.org/login/oauth2/code/google

# Eureka — co-located
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RabbitMQ — co-located
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Tune logging for production
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.com.auth_service=INFO

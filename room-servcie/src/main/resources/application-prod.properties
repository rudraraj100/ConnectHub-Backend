# ── Production overrides for room-service ──

spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_rooms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=connecthub
spring.datasource.password=${DB_PASSWORD}

# Internal service URLs — all services co-located on EC2
auth.service.url=http://localhost:8081
message.service.url=http://localhost:8083

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Logging
logging.level.com.room_servcie=INFO

spring.application.name=room-service
server.port=8082

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_rooms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME_LOCAL:root}
spring.datasource.password=${DB_PASSWORD_LOCAL:rudra@root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.registry-fetch-interval-seconds=5

# Auth Service base URL (Feign fallback)
auth.service.url=http://localhost:8081

# Message Service base URL — used by MessageServiceClient to sync pin/unpin
message.service.url=http://localhost:8083

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger / OpenAPI
# NOTE: Do NOT override springdoc.api-docs.path.
# The default /v3/api-docs is what the API Gateway aggregator routes expect.
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.room_servcie=DEBUG

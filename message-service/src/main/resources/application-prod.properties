# ── Production overrides for message-service ──

spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_messages?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=connecthub
spring.datasource.password=${DB_PASSWORD}

# Internal service URLs
room.service.url=http://localhost:8082

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Logging
logging.level.com.messageservice=INFO

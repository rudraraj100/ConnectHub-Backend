spring.application.name=message-service
server.port=8083

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_messages?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME_LOCAL:root}
spring.datasource.password=${DB_PASSWORD_LOCAL:rudra@root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.registry-fetch-interval-seconds=5

# Feign — room-service base URL (fallback if Eureka is not used)
room.service.url=http://localhost:8082

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger / OpenAPI
# NOTE: Do NOT set springdoc.api-docs.path here.
# The default is /v3/api-docs, which is what the API Gateway routes expect.
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.messageservice=DEBUG

version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# ConnectHub — SonarQube + PostgreSQL Stack
#
# Spin up with:  docker compose up -d
# Tear down:     docker compose down  (add -v to also wipe the Postgres volume)
#
# SonarQube UI: http://localhost:9000
# Default login: admin / admin  (change on first login!)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── SonarQube Community Edition ───────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.4-community
    container_name: connecthub-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # Increase heap for multi-service analysis
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms128m"
      SONAR_CE_JAVAOPTS:  "-Xmx512m -Xms128m"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - sonar-net
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── PostgreSQL (SonarQube's database) ─────────────────────────────────────
  sonar-db:
    image: postgres:15-alpine
    container_name: connecthub-sonar-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    networks:
      - sonar-net
    restart: unless-stopped
    heal
    
    thcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Named volumes (data survives container restarts) ──────────────────────
volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_postgres_data:

# ── Internal bridge network ───────────────────────────────────────────────
networks:
  sonar-net:
    driver: bridge

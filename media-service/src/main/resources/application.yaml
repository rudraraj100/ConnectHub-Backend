spring:
  application:
    name: media-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/connecthub_media?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME_LOCAL:root}
    password: ${DB_PASSWORD_LOCAL:rudra@root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  media:
    local-path: ${MEDIA_LOCAL_PATH:./uploads}
    base-url: http://localhost:8080   # Gateway base URL — used to build absolute media URLs
    s3:
      bucket: connecthub-media

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  # NOTE: Do NOT override api-docs.path.
  # The default /v3/api-docs is what the API Gateway aggregator routes expect.
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.media_service: DEBUG
